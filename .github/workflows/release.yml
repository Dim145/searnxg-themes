name: release

# Tag a release to publish a drop-in theme archive:
#   git tag google-v2026.06.07 && git push origin google-v2026.06.07
# (any tag works; the archive is named searxng-<theme>-theme.zip)

on:
  push:
    tags: ["v*", "*-v*", "release-*"]
  workflow_dispatch:
    inputs:
      theme:
        description: "theme to package"
        default: "google"

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get update -qq && sudo apt-get install -y zip >/dev/null

      - name: Build & package
        run: ./install/package.sh "${{ github.event.inputs.theme || 'google' }}"

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          notes="Drop-in SearXNG theme archive (searxng-*-theme.zip). "
          notes+="Native/source one-liner: curl -fsSL https://raw.githubusercontent.com/$REPO/main/install/install.sh | bash -s -- --repo $REPO --target /path/to/searxng . "
          notes+="Persistent Docker overlay: see docker/README.md . "
          notes+="Then set ui.default_theme: google in settings.yml and restart. Verify the download against the .sha256."
          gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.sha256 \
            --title "$GITHUB_REF_NAME" --generate-notes --notes "$notes"

      - name: Upload artifact (for non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: searxng-theme
          path: dist/*
